        * { font-family: 'Tajawal', 'Changa', sans-serif; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow-x: hidden; scroll-behavior: smooth; }
        body { background: var(--bg-main); min-height: 100vh; display: flex; flex-direction: column; transition: background 0.5s ease, color 0.5s ease; }
        .app-container { width: 100%; max-width: 100%; margin: 0 auto; padding: 0 8px; }
        @media (min-width: 768px) { .app-container { max-width: 1200px; padding: 0 16px; } }
        .theme-toggle-wrapper { position: fixed; top: 12px; left: 12px; z-index: 9999; }
        .theme-toggle-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--toggle-bg); border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--toggle-icon); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--shadow-lg); position: relative; overflow: hidden; }
        .theme-toggle-btn:hover { transform: scale(1.15) rotate(20deg); box-shadow: 0 12px 35px rgba(245,158,11,0.4); border-color: var(--accent-amber); }
        .theme-toggle-btn:active { transform: scale(0.9); }
        .theme-toggle-btn .fa-sun { animation: sunSpin 0.7s ease; }
        .theme-toggle-btn .fa-moon { animation: moonSlide 0.7s ease; }
        @keyframes sunSpin { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0deg) scale(1); opacity: 1; } }
        @keyframes moonSlide { from { transform: translateY(-20px) scale(0); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        .header-main { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 12px 0; margin-bottom: 14px; position: relative; overflow: hidden; transition: all 0.5s ease; box-shadow: var(--shadow-sm); }
        .header-main::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--header-gradient-line); opacity: 0.9; }
        .logo-wrapper { position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        @media (min-width: 768px) { .logo-wrapper { width: 80px; height: 80px; } }
        .logo-ring { position: absolute; border-radius: 50%; border: 2px solid transparent; animation: ringRotate 8s linear infinite; }
        .logo-ring.ring-1 { width: 64px; height: 64px; border-top-color: var(--logo-ring-1); border-right-color: var(--logo-ring-1); animation-duration: 4s; }
        .logo-ring.ring-2 { width: 56px; height: 56px; border-bottom-color: var(--logo-ring-2); border-left-color: var(--logo-ring-2); animation-duration: 6s; animation-direction: reverse; }
        .logo-ring.ring-3 { width: 48px; height: 48px; border-top-color: var(--logo-ring-3); border-left-color: var(--logo-ring-3); animation-duration: 5s; }
        @media (min-width: 768px) { .logo-ring.ring-1 { width: 80px; height: 80px; } .logo-ring.ring-2 { width: 70px; height: 70px; } .logo-ring.ring-3 { width: 60px; height: 60px; } }
        @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-inner { width: 40px; height: 40px; border-radius: 50%; background: var(--logo-inner-bg); display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: var(--logo-shadow); border: 1px solid var(--border); overflow: hidden; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @media (min-width: 768px) { .logo-inner { width: 52px; height: 52px; } }
        .logo-inner img { width: 85%; height: 85%; object-fit: contain; position: relative; z-index: 1; }
        .logo-inner-fallback { display: none; width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet)); align-items: center; justify-content: center; font-size: 1.1rem; color: white; }
        @media (min-width: 768px) { .logo-inner-fallback { width: 52px; height: 52px; font-size: 1.4rem; } }
        .logo-wrapper:hover .logo-ring.ring-1 { animation-duration: 1.5s; }
        .logo-wrapper:hover .logo-ring.ring-2 { animation-duration: 2.5s; }
        .logo-wrapper:hover .logo-ring.ring-3 { animation-duration: 2s; }
        .logo-wrapper:hover .logo-inner { box-shadow: 0 15px 45px rgba(59,130,246,0.4); transform: scale(1.06); }
        .title-main { font-family: 'Changa', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text-primary); line-height: 1.2; transition: color 0.5s ease; }
        @media (min-width: 768px) { .title-main { font-size: 1.8rem; } }
        .title-gradient { background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 50%, var(--accent-violet) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle-muted { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); font-weight: 600; transition: color 0.5s ease; }
        @media (min-width: 768px) { .subtitle-muted { font-size: 0.7rem; letter-spacing: 4px; } }
        .dev-badge { background: var(--dev-badge-bg); color: var(--dev-badge-text); padding: 5px 12px; border-radius: 50px; font-size: 0.68rem; font-weight: 700; border: 1px solid var(--dev-badge-border); transition: all 0.5s ease; white-space: nowrap; }
        @media (min-width: 768px) { .dev-badge { padding: 6px 16px; font-size: 0.72rem; } }
        .score-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        @media (min-width: 768px) { .score-row { gap: 12px; margin-bottom: 20px; } }
        .score-card { flex: 1; min-width: 100px; background: var(--score-card-bg); border: 1px solid var(--score-card-border); border-radius: 16px; padding: 14px 16px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        @media (min-width: 768px) { .score-card { min-width: 140px; padding: 20px 24px; border-radius: 20px; } }
        .score-card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: var(--shadow-xl); }
        .score-label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 4px; position: relative; z-index: 1; }
        @media (min-width: 768px) { .score-label { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 6px; } }
        .score-value { font-size: 1.6rem; font-weight: 900; color: var(--text-primary); direction: ltr; text-align: right; font-family: 'Changa', sans-serif; position: relative; z-index: 1; transition: color 0.5s ease; }
        @media (min-width: 768px) { .score-value { font-size: 2.4rem; } }
        .score-value.blue { color: var(--score-value-blue); }
        .score-value.emerald { color: var(--score-value-emerald); }
        .percent-chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 50px; font-weight: 700; font-size: 0.78rem; font-family: 'Changa', sans-serif; direction: ltr; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); animation: percentPop 0.4s ease; white-space: nowrap; }
        @media (min-width: 768px) { .percent-chip { padding: 6px 14px; font-size: 0.85rem; } }
        .percent-chip.est1 { background: var(--percent-badge-bg); color: var(--percent-badge-text); border: 1.5px solid var(--percent-badge-border); box-shadow: 0 0 15px rgba(59,130,246,0.15); }
        .percent-chip.est2 { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1.5px solid rgba(139,92,246,0.3); box-shadow: 0 0 15px rgba(139,92,246,0.15); }
        .percent-chip.gpa { background: var(--percent-gpa-bg); color: var(--percent-gpa-text); border: 1.5px solid var(--percent-gpa-border); box-shadow: 0 0 15px rgba(16,185,129,0.15); }
        [data-theme="light"] .percent-chip.est2 { background: rgba(124,58,237,0.08); color: #7c3aed; border: 1.5px solid rgba(124,58,237,0.25); box-shadow: 0 0 15px rgba(124,58,237,0.1); }
        @keyframes percentPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .section-header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .btn-new-cert { background: var(--btn-new-bg); border: 2px solid var(--btn-new-border); color: var(--btn-new-text); font-weight: 700; padding: 12px 18px; border-radius: 14px; cursor: pointer; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; font-size: 0.72rem; align-self: center; box-shadow: var(--btn-new-shadow); letter-spacing: 1px; }
        @media (min-width: 768px) { .btn-new-cert { padding: 16px 28px; border-radius: 18px; font-size: 0.82rem; } }
        .btn-new-cert:hover { transform: translateY(-3px) scale(1.03); box-shadow: var(--btn-new-hover-shadow); }
        .btn-new-cert:active { transform: scale(0.95); }
        .tabs-wrapper { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; padding: 5px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); transition: all 0.5s ease; box-shadow: var(--shadow-sm); }
        @media (min-width: 768px) { .tabs-wrapper { gap: 8px; padding: 8px; border-radius: 20px; margin-bottom: 20px; } }
        .tab-glow { padding: 8px 10px; font-weight: 700; font-size: 0.65rem; background: transparent; border: 2px solid transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 12px; white-space: nowrap; position: relative; }
        @media (min-width: 768px) { .tab-glow { padding: 12px 20px; font-size: 0.75rem; border-radius: 16px; } }
        .tab-glow:hover { color: var(--tab-hover-text); background: var(--tab-hover-bg); transform: translateY(-2px); }
        .tab-glow.american-tab.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.5); color: var(--accent-blue); box-shadow: var(--glow-blue); }
        .tab-glow.thanaweya-tab.active { background: rgba(6,182,212,0.12); border-color: rgba(6,182,212,0.5); color: var(--accent-cyan); box-shadow: var(--glow-cyan); }
        .tab-glow.gulf-tab.active { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.5); color: var(--accent-amber); box-shadow: var(--glow-amber); }
        .tab-glow.libya-tab.active { background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.5); color: var(--accent-rose); box-shadow: var(--glow-rose); }
        .tab-glow.jordan-tab.active { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.5); color: var(--accent-violet); box-shadow: var(--glow-violet); }
        .tab-glow.azhar-tab.active { background: rgba(236,72,153,0.12); border-color: rgba(236,72,153,0.5); color: var(--accent-pink); box-shadow: var(--glow-pink); }
        .card-main { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 12px; transition: all 0.3s ease; animation: slideUp 0.5s ease-out backwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card-main:hover { border-color: var(--border-hover); box-shadow: var(--shadow-lg); }

        @media (min-width: 768px) { .card-heading { font-size: 1rem; gap: 10px; } }
        .dot-accent { width: 8px; height: 8px; border-radius: 50%; display: inline-block; animation: dotPulse 2s infinite; }
        @media (min-width: 768px) { .dot-accent { width: 10px; height: 10px; } }
        @keyframes dotPulse { 0%, 100% { box-shadow: 0 0 8px currentColor; } 50% { box-shadow: 0 0 20px currentColor, 0 0 30px currentColor; } }
        .method-collapse { background: var(--method-bg); border: 2px solid var(--method-border); border-radius: 16px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 4px 20px rgba(245,158,11,0.08); transition: all 0.4s ease; }

        .method-icon-wrapper { width: 34px; height: 34px; border-radius: 12px; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(251,191,36,0.1)); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--method-accent); transition: all 0.3s ease; }
        @media (min-width: 768px) { .method-icon-wrapper { width: 40px; height: 40px; border-radius: 14px; font-size: 1.1rem; } }

<body data-theme="dark">

<div class="app-container">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.toggleTheme=function(){const e=document.body,t=document.getElementById("themeToggleBtn"),n=t.querySelector("i"),o=e.getAttribute("data-theme"),s="dark"===o?"light":"dark";e.setAttribute("data-theme",s),n.className="dark"===s?"fas fa-sun":"fas fa-moon",localStorage.setItem("theme",s)};
(function(){const e=localStorage.getItem("theme")||"dark";document.body.setAttribute("data-theme",e);const t=document.querySelector("#themeToggleBtn i");t&&(t.className="dark"===e?"fas fa-sun":"fas fa-moon")})();
window.handleLogoError=function(){const e=document.getElementById("logoImg"),t=document.getElementById("logoFallback"),n=document.querySelector(".logo-inner");e&&t&&n&&(e.style.display="none",t.style.display="flex")};
document.addEventListener("DOMContentLoaded",function(){const e=document.getElementById("logoImg");e&&e.complete&&0===e.naturalWidth&&handleLogoError()});

(function(){const s={activeTab:"american",amPath:"non_eng",est1Scores:{part1:"",part2:""},est2Scores:{part1:"",part2:""},amSubjects:Array(8).fill(""),thSystem:"new",thScore:"",gulfSubjects:Array(7).fill().map(()=>({mark:"",isStar:!1})),libyaSubjects:Array(8).fill(""),jordanSubjects:Array(7).fill(""),azharPath:"sci",azharLitSys:"420",azharArabic:"",azharCultural:"",methodOpen:!1,est1Percent:0, est2Percent:0, gpaPercent:0};
const e=document.getElementById("tabContent"),t=document.getElementById("rawScoreDisplay"),n=document.getElementById("finalPercentage"),o=document.getElementById("rawScoreItem");
const a={american:"american-tab",thanaweya:"thanaweya-tab",gulf:"gulf-tab",libya:"libya-tab",jordan:"jordan-tab",azhar:"azhar-tab"};

function g(){
    const est1Total=(parseFloat(s.est1Scores.part1)||0)+(parseFloat(s.est1Scores.part2)||0);
    let est1Pct=0;
    if(est1Total>=1090&&est1Total<=1600){est1Pct=est1Total/1600*75;}
    else if(est1Total>=800){est1Pct=est1Total/1600*60;}
    s.est1Percent=est1Pct;

    /* EST2 يُحسب دائمًا لكلا المسارين */
    const est2Total=(parseFloat(s.est2Scores.part1)||0)+(parseFloat(s.est2Scores.part2)||0);
    let est2Pct=0;
    if(est2Total>=900&&est2Total<=1600){est2Pct=est2Total/1600*15;}
    s.est2Percent=est2Pct;

    const oMarks=s.amSubjects.map(e=>parseFloat(e)).filter(e=>!isNaN(e));
    const gpaSum=oMarks.reduce((e,t)=>e+t,0);
    const gpaPct=gpaSum/800*40;
    s.gpaPercent=gpaPct;

    return s.est1Percent+s.est2Percent+s.gpaPercent;
}
function h(){const e=parseFloat(s.thScore)||0;return"new"===s.thSystem?e/320*100:e/410*100}
function u(){return s.gulfSubjects.reduce((e,t)=>t.isStar?e+50:e+(parseFloat(t.mark)||0),0)/7}
function l(){return s.libyaSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0)/1200*100}
function c(){return s.jordanSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0)/1400*100}
function d(){const e=(parseFloat(s.azharArabic)||0)+(parseFloat(s.azharCultural)||0);return"sci"===s.azharPath?e/4.4:"420"===s.azharLitSys?e/4.2:e/3.8}

function p(){
    const e=document.getElementById("est1TotalDisplay"),t=document.getElementById("est1Alert");
    if(e){const n=(parseFloat(s.est1Scores.part1)||0)+(parseFloat(s.est1Scores.part2)||0);e.textContent=n;t&&(t.style.display=n>0&&n<800?"inline-block":"none")}
    const n=document.getElementById("est1PercentDisplay");
    if(n){n.textContent=s.est1Percent.toFixed(1)+"%";}
    const o=document.getElementById("est2TotalDisplay"),a=document.getElementById("est2Alert");
    if(o){const e=(parseFloat(s.est2Scores.part1)||0)+(parseFloat(s.est2Scores.part2)||0);o.textContent=e;a&&(a.style.display=e>0&&e<900?"inline-block":"none")}
    const i=document.getElementById("est2PercentDisplay");
    if(i){i.textContent=s.est2Percent.toFixed(1)+"%";}
    const r=document.getElementById("gpaPercentDisplay");
    if(r){r.textContent=s.gpaPercent.toFixed(1)+"%";}
    const d=document.getElementById("azharTotalSum");d&&(d.textContent=(parseFloat(s.azharArabic)||0)+(parseFloat(s.azharCultural)||0));
    const m=document.getElementById("libyaTotalSum");m&&(m.textContent=s.libyaSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0));
    const c=document.getElementById("jordanTotalSum");c&&(c.textContent=s.jordanSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0));
}

function m(){
    const a=(()=>{switch(s.activeTab){case"american":return g();case"thanaweya":return h();case"gulf":return u();case"libya":return l();case"jordan":return c();case"azhar":return d();default:return 0}})();
    n.textContent=a.toFixed(1)+"%";
    let e=null;
    switch(s.activeTab){
        case"thanaweya":e=parseFloat(s.thScore)||0;break;
        case"gulf":e=s.gulfSubjects.reduce((e,t)=>t.isStar?e+50:e+(parseFloat(t.mark)||0),0);break;
        case"libya":e=s.libyaSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0);break;
        case"jordan":e=s.jordanSubjects.reduce((e,t)=>e+(parseFloat(t)||0),0);break;
        case"azhar":e=(parseFloat(s.azharArabic)||0)+(parseFloat(s.azharCultural)||0);
    }
    null!==e?(o.style.display="",t.textContent=e):o.style.display="none";
    p();
}

function f(){let t="";switch(s.activeTab){case"american":t=A();break;case"thanaweya":t=y();break;case"gulf":t=b();break;case"libya":t=x();break;case"jordan":t=v();break;case"azhar":t=w()}e.innerHTML=t;k();m()}
function C(e,t){const n=s.methodOpen;return`<div class="method-collapse"><div class="method-header ${n?"open":""}" onclick="toggleMethod(this)"><span class="method-title"><div class="method-icon-wrapper"><i class="fas fa-scroll"></i></div>${e}</span><div class="method-arrow"><i class="fas fa-chevron-down"></i></div></div><div class="method-body ${n?"":"closed"}"><div class="method-content">${t}</div></div></div>`}

function A(){
    let e="";
    for(let t=0;t<8;t++)e+=`<div class="col-6 col-md-3"><label class="subject-label">المادة ${t+1}</label><input class="input-main enter-next" data-field="amSubjects[${t}]" value="${s.amSubjects[t]}" max="100"></div>`;

    const t=(parseFloat(s.est1Scores.part1)||0)+(parseFloat(s.est1Scores.part2)||0);
    const n=(parseFloat(s.est2Scores.part1)||0)+(parseFloat(s.est2Scores.part2)||0);
    const o="eng"===s.amPath;

    /* شرح الطريقة الموحد – يشمل EST2 للجميع */
    const a=`<ul>
        <li><span class="method-highlight">1) Est1 او Sat1</span> : بشوف الاعلي درجه في round name ونجمعهم. <strong>لازم المجموع يكون ≥ 800</strong>.<br>
        • من 800 إلى 1089 : نقسم على 1600 ونضرب × <span class="method-highlight">60</span>.<br>
        • من 1090 إلى 1600 : نقسم على 1600 ونضرب × <span class="method-highlight">75</span>.</li>
        <li><span class="method-highlight">2) Est2</span> : بشوف الاعلي درجه في round name ونجمعهم. <strong>لازم المجموع يكون ≥ 900</strong>.<br>
        • نقسم المجموع على 1600 ونضرب × <span class="method-highlight">15</span>.</li>
        <li><span class="method-highlight">3) GPA</span> : ناخد 8 مقررات اعلي درجات (بشرط credits = 1 ساعه).<br>
        • على الاقل 4 مقررات Grade 12 و 4 مقررات Grade 11.<br>
        • <strong>يجب اختيار math و advanced math</strong> ضمن المقررات.<br>
        • مجموع المقررات <span class="divide-sign">÷</span> 800 × <span class="method-highlight">40</span>.</li>
        <li><strong>النسبة النهائية = Est1 + Est2 + GPA</strong>.</li>
    </ul>`;

    return`<div class="card-main mb-3 text-center">
        <div class="card-heading justify-content-center mb-3"><span class="dot-accent" style="background:var(--accent-blue);"></span> الكلية المستهدفة</div>

    ${C("طريقة حساب الدبلومة الأمريكية",a)}
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card-main">

                <div class="mt-2 d-flex align-items-center gap-2 flex-wrap">

                    <span id="est1Alert" class="alert-inline" style="display:${t>0&&t<800?"inline-block":"none"}">⚠ يجب أن يكون ≥ 800</span>

            </div>

            <div class="card-main mt-3">
                <div class="section-header-row">
                    <div class="card-heading mb-0"><span class="dot-accent" style="background:var(--accent-violet);"></span> EST 2</div>
                    <span class="percent-chip est2" id="est2PercentDisplay">${s.est2Percent.toFixed(1)}%</span>
                </div>
                <div class="row g-2">
                    <div class="col-6"><input class="input-main enter-next" data-field="est2Scores.part1" value="${s.est2Scores.part1}"></div>
                    <div class="col-6"><input class="input-main enter-next" data-field="est2Scores.part2" value="${s.est2Scores.part2}"></div>
                </div>
                <div class="mt-2 d-flex align-items-center gap-2 flex-wrap">
                    <span class="badge-accent-sm">المجموع: <span id="est2TotalDisplay">${n}</span></span>
                    <span id="est2Alert" class="alert-inline" style="display:${n>0&&n<900?"inline-block":"none"}">⚠ يجب أن يكون ≥ 900</span>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card-main">
                <div class="section-header-row">
                    <div class="card-heading mb-0"><span class="dot-accent" style="background:var(--accent-emerald);"></span> GPA (8 مقررات)</div>
                    <span class="percent-chip gpa" id="gpaPercentDisplay">${s.gpaPercent.toFixed(1)}%</span>
                </div>
                <div class="row g-2">${e}</div>
            </div>
        </div>
    </div>`;
